substitutions:
  name: "fridgetroll"
  temp_update_interval_s: 10
  # Max speed for the fridge fan as a percentage.
  max_fridge_fan_speed: 75
  # Emergency absolute delta (degrees C) above target to trigger max speed
  compressor_emergency_delta: 3.0
  # Anti-short-cycle delay for the compressor.
  compressor_anti_short_cycle_s: 180
  # Duration to keep the compressor off during defrost.
  defrost_duration_s: 1800
  # Fridge freeze protection thresholds.
  fridge_freeze_protection_low: 1.0
  fridge_freeze_protection_high: 1.5

  # Pins for S3 Mini
  one_wire_bus_pin: GPIO11
  compressor_enable_pin: GPIO12
  compressor_pwm_pin: GPIO10
  compressor_fan_speed_pin: GPIO4
  compressor_fan_pwm_pin: GPIO13
  door_pin: GPIO2
  rgb_pin: GPIO47
  fridge_fan_pin: GPIO18

esphome:
  name: ${name}
  on_boot:
    - priority: 600
      then:
        - lambda: |-
            if (!id(syslog_ip_text).state.empty()) {
              id(syslog_udp)->set_addresses({id(syslog_ip_text).state.c_str()});
            }
            if (id(syslog_port_number).state > 0) {
              id(syslog_udp)->set_broadcast_port(id(syslog_port_number).state);
            }
            if (!id(influxdb_host_text).state.empty()) {
              id(influxdb_udp)->set_addresses({id(influxdb_host_text).state.c_str()});
            }
            if (id(influxdb_port_number).state > 0) {
              id(influxdb_udp)->set_broadcast_port(id(influxdb_port_number).state);
            }
        - script.execute: apply_sensor_addresses
        - script.execute: pet_fridge_watchdog
        - script.execute: pet_freezer_watchdog
    - priority: -10
      then:
        - component.update: fridge_temp
        - component.update: freezer_temp

esp32:
  board: lolin_s3_mini
  framework:
    type: esp-idf

api:
  reboot_timeout: 0s

improv_serial:

esp32_improv:
  authorizer: none

captive_portal:

wifi:
  ap:
    ssid: "FridgeTroll Fallback"

web_server:
  port: 80
  version: 3
  local: true
  sorting_groups:
    - id: "environment"
      name: "Environment"
      sorting_weight: 10
    - id: "temp_targets"
      name: "Temperature Targets"
      sorting_weight: 15
    - id: "settings"
      name: "Settings"
      sorting_weight: 20
    - id: "compressor_stats"
      name: "Compressor Stats"
      sorting_weight: 30
    - id: "freezer_stats"
      name: "Freezer Stats"
      sorting_weight: 35
    - id: "command"
      name: "Command State"
      sorting_weight: 40
    - id: "sensor_addresses"
      name: "Sensor Addresses"
      sorting_weight: 50
    - id: "udp_settings"
      name: "UDP Configuration (Restart Required)"
      sorting_weight: 60
    - id: "debug"
      name: "Debug Tools"
      sorting_weight: 100
    - id: "host"
      name: "Host"
      sorting_weight: 110

logger:
  level: DEBUG

select:
  - platform: logger
    name: "Logger select"
    entity_category: "diagnostic"
    web_server:
      sorting_group_id: "debug"

ota:
  - platform: esphome
    password: !secret ota_password

time:
  - platform: sntp
    id: sntp_time
    timezone: "America/New_York"
    on_time:
      - seconds: 0
        minutes: 0
        hours: 3
        then:
          - lambda: |-
              if (id(max_rest_duration_s) < ${defrost_duration_s}) {
                ESP_LOGI("defrost", "Nightly defrost triggered (max 24h rest was %.0fs, threshold %us).", id(max_rest_duration_s), ${defrost_duration_s});
                id(defrost_mode).turn_on();
              } else {
                ESP_LOGI("defrost", "Nightly defrost skipped (max 24h rest was %.0fs, threshold %us).", id(max_rest_duration_s), ${defrost_duration_s});
              }
              id(max_rest_duration_s) = 0;

udp:
  - id: syslog_udp
  - id: influxdb_udp

syslog:
  udp_id: syslog_udp
  strip: true # strip color codes
  level: info

one_wire:
  - platform: gpio
    pin: ${one_wire_bus_pin}
    id: fridge_bus

text_sensor:
  - platform: version
    name: "ESPHome"
    web_server:
      sorting_group_id: "host"

sensor:
  - platform: internal_temperature
    name: "ESP"
    id: sys_esp_temperature
    update_interval: 60s
    icon: "mdi:thermometer-lines"
    web_server:
      sorting_group_id: "host"

  - platform: uptime
    name: Uptime
    id: sys_uptime
    update_interval: ${temp_update_interval_s}s
    web_server:
      sorting_group_id: "host"

  - platform: wifi_signal
    name: RSSI
    icon: "mdi:wifi"
    id: wifi_signal_db
    update_interval: ${temp_update_interval_s}s
    entity_category: "diagnostic"
    web_server:
      sorting_group_id: "host"

  - platform: template
    name: "Measured Recovery Time"
    id: compressor_recovery_time_measured_sensor
    icon: "mdi:timer-sand"
    unit_of_measurement: "h"
    accuracy_decimals: 2
    entity_category: "diagnostic"
    web_server:
      sorting_group_id: "freezer_stats"

  - platform: dallas_temp
    name: "Fridge"
    icon: "mdi:water-thermometer"
    web_server:
      sorting_group_id: "environment"
    id: fridge_temp
    update_interval: never # Updated by interval
    filters:
      - lambda: |-
          if (x == 85.0) {
            ESP_LOGE("fridge_temp", "Sensor (fridge_temp) reported 85°C (power-on reset value), filtering out.");
            return {};
          }
          return x;
    on_value:
      then:
        - script.execute: pet_fridge_watchdog

  - platform: dallas_temp
    name: "Freezer"
    icon: "mdi:snowflake-thermometer"
    web_server:
      sorting_group_id: "environment"
    id: freezer_temp
    update_interval: never # Updated by interval
    filters:
      - lambda: |-
          if (x == 85.0) {
            ESP_LOGE("freezer_temp", "Sensor (freezer_temp) reported 85°C (power-on reset value), filtering out.");
            return {};
          }
          return x;
    on_value:
      then:
        - script.execute: pet_freezer_watchdog

  - platform: pulse_counter
    name: "Compressor Cooling Fan"
    id: "compressor_fan_rpm"
    icon: "mdi:fan"
    web_server:
      sorting_group_id: "compressor_stats"
    unit_of_measurement: "RPM"
    accuracy_decimals: 0
    filters:
      - lambda: return x / 2.0;
    update_interval: ${temp_update_interval_s}s
    pin:
      number: ${compressor_fan_speed_pin}
      inverted: true
      mode:
        input: true
        pullup: true

  - platform: duty_time
    id: compressor_on_time
    name: "Compressor On Time"
    icon: "mdi:pump"
    web_server:
      sorting_group_id: "compressor_stats"
    lambda: "return id(compressor).state;"
    accuracy_decimals: 0
    update_interval: ${temp_update_interval_s}s
    last_time:
      name: "Last Compressor On Time"
      icon: "mdi:pump"
      web_server:
        sorting_group_id: "compressor_stats"
      accuracy_decimals: 0

  - platform: duty_time
    id: compressor_off_time
    name: "Compressor Off Time"
    icon: "mdi:pump-off"
    web_server:
      sorting_group_id: "compressor_stats"
    lambda: "return !id(compressor).state;"
    accuracy_decimals: 0
    update_interval: ${temp_update_interval_s}s
    last_time:
      name: "Last Compressor Off Time"
      icon: "mdi:pump-off"
      web_server:
        sorting_group_id: "compressor_stats"
      accuracy_decimals: 0

  - platform: template
    name: "Freezer Delta"
    id: freezer_temp_delta_per_hour
    unit_of_measurement: "°C/h"
    accuracy_decimals: 2
    icon: "mdi:chart-timeline-variant"
    web_server:
      sorting_group_id: "freezer_stats"

  - platform: template
    name: "Desired Freezer Delta"
    id: freezer_temp_delta_per_hour_desired
    unit_of_measurement: "°C/h"
    accuracy_decimals: 2
    icon: "mdi:chart-timeline-variant-shimmer"
    web_server:
      sorting_group_id: "freezer_stats"

  - platform: template
    name: "Predicted Freezer"
    id: freezer_temp_predicted
    unit_of_measurement: "°C"
    accuracy_decimals: 2
    icon: "mdi:clock-end"
    web_server:
      sorting_group_id: "freezer_stats"

  - platform: duty_time
    id: door_open_time
    internal: true
    lambda: "return !id(door_closed).state;"
    update_interval: ${temp_update_interval_s}s

  - platform: template
    id: compressor_rpm
    internal: True
    update_interval: never # Updated from compressor fan
    on_value:
      - lambda: |-
          if (x < 2000) return;
          float ratio = (x - 2000.0) / 2000.0;
          if (ratio < 0) ratio = 0;
          if (ratio > 1) ratio = 1;
          const float duty = (0.87 - (ratio * 0.6));
          ESP_LOGD("compressor_rpm", "Setting compressor PWM output to %f.", duty);
          id(compressor_pwm).set_level(duty);

  - platform: dallas_temp
    name: "Compressor"
    id: compressor_temp
    icon: "mdi:radiator"
    web_server:
      sorting_group_id: "environment"
    update_interval: never # Updated by interval
    filters:
      - lambda: |-
          if (x == 85.0) {
            ESP_LOGE("compressor_temp", "Sensor (compressor_temp) reported 85°C (power-on reset value), filtering out.");
            return {};
          }
          return x;
    on_value:
      then:
        - lambda: |-
            constexpr float kHighCompressorTemp = 43;
            constexpr float kMinFanSpeed = 0.0; // Minimum fan speed %
            constexpr float kMaxFanSpeed = 100.0; // Maximum fan speed %

            const float comp_temp = x;
            const float amb_temp = id(ambient_temp).state;

            if (std::isnan(comp_temp) || std::isnan(amb_temp)) {
              auto call = id(compressor_cooling_fan).turn_on();
              call.set_speed(100);
              call.perform();
              return;
            }

            const float delta = comp_temp - amb_temp;

            // Fan curve configuration (Delta T from ambient)
            const float min_delta = 5.0; // Fan starts here
            const float max_delta = std::min(15.0f, kHighCompressorTemp - amb_temp); // Fan at max speed here

            if (delta < min_delta) {
              if (id(compressor_cooling_fan).state) {
                id(compressor_cooling_fan).turn_off().perform();
              }
              return;
            }

            // Linear interpolation.
            const float speed_factor = ((delta - min_delta) / (max_delta - min_delta));
            const float speed_percent = kMinFanSpeed + (kMaxFanSpeed - kMinFanSpeed) * speed_factor;
            auto call = id(compressor_cooling_fan).turn_on();
            call.set_speed(std::min(100.0f, speed_percent));
            call.perform();

  - platform: dallas_temp
    name: "Ambient"
    id: ambient_temp
    icon: "mdi:home-thermometer"
    web_server:
      sorting_group_id: "environment"
    update_interval: never # Updated by interval
    filters:
      - lambda: |-
          if (x == 85.0) {
            ESP_LOGE("ambient_temp", "Sensor (ambient_temp) reported 85°C (power-on reset value), filtering out.");
            return {};
          }
          return x;

text:
  - platform: template
    mode: text
    name: "Fridge"
    id: fridge_temp_address_text
    icon: "mdi:identifier"
    optimistic: true
    min_length: 18
    max_length: 18
    restore_value: true
    entity_category: "config"
    web_server:
      sorting_group_id: "sensor_addresses"
    on_value:
      - script.execute: apply_sensor_addresses

  - platform: template
    mode: text
    name: "Freezer"
    id: freezer_temp_address_text
    icon: "mdi:identifier"
    optimistic: true
    min_length: 18
    max_length: 18
    restore_value: true
    entity_category: "config"
    web_server:
      sorting_group_id: "sensor_addresses"
    on_value:
      - script.execute: apply_sensor_addresses

  - platform: template
    mode: text
    name: "Compressor"
    id: compressor_temp_address_text
    icon: "mdi:identifier"
    optimistic: true
    min_length: 18
    max_length: 18
    restore_value: true
    entity_category: "config"
    web_server:
      sorting_group_id: "sensor_addresses"
    on_value:
      - script.execute: apply_sensor_addresses

  - platform: template
    mode: text
    name: "Ambient"
    id: ambient_temp_address_text
    icon: "mdi:identifier"
    optimistic: true
    min_length: 18
    max_length: 18
    restore_value: true
    entity_category: "config"
    web_server:
      sorting_group_id: "sensor_addresses"
    on_value:
      - script.execute: apply_sensor_addresses

  - platform: template
    mode: text
    name: "Syslog IP"
    id: syslog_ip_text
    icon: "mdi:console-network"
    optimistic: true
    min_length: 7
    max_length: 15
    restore_value: true
    entity_category: "config"
    web_server:
      sorting_group_id: "udp_settings"

  - platform: template
    mode: text
    name: "InfluxDB IP"
    id: influxdb_host_text
    icon: "mdi:table-network"
    optimistic: true
    min_length: 7
    max_length: 15
    restore_value: true
    entity_category: "config"
    web_server:
      sorting_group_id: "udp_settings"

globals:
  - id: max_rest_duration_s
    type: float
    restore_value: no
    initial_value: "0.0"

number:
  - platform: template
    name: "Syslog Port"
    id: syslog_port_number
    icon: "mdi:numeric"
    optimistic: true
    min_value: 1
    max_value: 65535
    initial_value: 514
    step: 1
    restore_value: true
    entity_category: "config"
    web_server:
      sorting_group_id: "udp_settings"

  - platform: template
    name: "InfluxDB Port"
    id: influxdb_port_number
    icon: "mdi:numeric"
    optimistic: true
    min_value: 1
    max_value: 65535
    initial_value: 8089
    step: 1
    restore_value: true
    entity_category: "config"
    web_server:
      sorting_group_id: "udp_settings"

  - platform: template
    name: "Compressor Speed Min Interval"
    id: compressor_speed_change_interval_number
    icon: "mdi:speedometer-slow"
    optimistic: true
    min_value: 0
    max_value: 600
    initial_value: 90
    step: 1
    unit_of_measurement: "s"
    restore_value: true
    entity_category: "config"
    web_server:
      sorting_group_id: "settings"

  - platform: template
    name: "Target Recovery Time"
    id: compressor_recovery_time_number
    icon: "mdi:clock-fast"
    unit_of_measurement: "h"
    optimistic: true
    min_value: 0.1
    max_value: 5.0
    initial_value: 1.0
    step: 0.1
    restore_value: true
    entity_category: "config"
    web_server:
      sorting_group_id: "settings"

  - platform: template
    name: "Recovery Evaluation Window"
    id: compressor_window_number
    icon: "mdi:history"
    unit_of_measurement: "s"
    optimistic: true
    min_value: 30
    max_value: 300
    initial_value: 60
    step: 10
    restore_value: true
    entity_category: "config"
    web_server:
      sorting_group_id: "settings"

  - platform: template
    name: "Recovery Tolerance"
    id: compressor_recovery_tolerance_number
    icon: "mdi:plus-minus-box"
    unit_of_measurement: "°C/h"
    optimistic: true
    min_value: 0.1
    max_value: 5.0
    initial_value: 1.0
    step: 0.1
    restore_value: true
    entity_category: "config"
    web_server:
      sorting_group_id: "settings"

  - platform: template
    name: "Thermal Prediction Lead"
    id: thermal_lead_number
    icon: "mdi:clock-end"
    unit_of_measurement: "min"
    optimistic: true
    min_value: 0
    max_value: 30
    initial_value: 5
    step: 1
    restore_value: true
    entity_category: "config"
    web_server:
      sorting_group_id: "settings"

  - platform: template
    name: "Defrost Target"
    id: defrost_target_temp
    icon: "mdi:thermometer-minus"
    unit_of_measurement: "°C"
    optimistic: true
    min_value: -25
    max_value: -15
    initial_value: -21
    step: 0.5
    restore_value: true
    entity_category: "config"
    web_server:
      sorting_group_id: "settings"

switch:
  - platform: template
    name: "Manual Override"
    id: manual_override
    icon: "mdi:cog-transfer"
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    entity_category: "diagnostic"
    web_server:
      sorting_group_id: "debug"

  - platform: template
    name: "Defrost Mode"
    id: defrost_mode
    icon: "mdi:snowflake-melt"
    restore_mode: ALWAYS_OFF
    optimistic: true
    web_server:
      sorting_group_id: "command"

binary_sensor:
  - platform: gpio
    pin:
      number: ${door_pin}
      mode: INPUT_PULLUP
    name: "Door Closed"
    id: "door_closed"
    icon: "mdi:fridge-industrial"
    web_server:
      sorting_group_id: "environment"
    on_release:
      - light.turn_on:
          id: onboard_rgb_light
          red: 1.0
          green: 1.0
          blue: 0.0
          brightness: 1.0
      - sensor.duty_time.reset: door_open_time
      # Sync to 1 immediately for our external triggers/monitoring
      - delay: 1s
      - component.update: door_open_time
      - script.execute: report_stats
    on_press:
      - light.turn_off:
          id: onboard_rgb_light
      - component.update: door_open_time # Sync final duration.
      - script.execute: report_stats
      # Sync zero immediately for our eternal triggers/monitoring.
      - sensor.duty_time.reset: door_open_time
      - script.execute: report_stats

output:
  - platform: ledc
    pin: ${compressor_pwm_pin}
    frequency: 200Hz
    channel: 0
    id: compressor_pwm

  - platform: gpio
    pin: ${compressor_enable_pin}
    id: compressor_enable_output

  - platform: ledc
    pin: ${compressor_fan_pwm_pin}
    frequency: 25kHz
    channel: 2
    id: compressor_cooling_fan_pwm

  - platform: ledc
    pin: ${fridge_fan_pin}
    frequency: 25kHz
    channel: 4
    id: fridge_fan_pwm

fan:
  - platform: speed
    output: compressor_cooling_fan_pwm
    name: "Compressor Cooling Fan"
    id: compressor_cooling_fan
    icon: "mdi:fan"
    web_server:
      sorting_group_id: "command"

  - platform: speed
    output: fridge_fan_pwm
    name: "Fridge Fan"
    id: fridge_fan
    icon: "mdi:fan"
    web_server:
      sorting_group_id: "command"

  - platform: template
    name: "Compressor"
    id: compressor
    icon: "mdi:pump"
    web_server:
      sorting_group_id: "command"
    speed_count: 5
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - output.turn_on: compressor_enable_output
      - sensor.duty_time.reset: compressor_on_time
      - component.update: compressor_off_time
      - lambda: |-
          id(compressor_rpm).publish_state((id(compressor).speed - 1) * 500 + 2000);
      - sensor.duty_time.reset: compressor_off_time
    on_turn_off:
      - output.turn_off: compressor_enable_output
      - component.update: compressor_on_time
      - sensor.duty_time.reset: compressor_on_time
      - sensor.duty_time.reset: compressor_off_time
      - lambda: id(compressor_rpm).publish_state(0);
    on_speed_set:
      - lambda: |-
          id(compressor_rpm).publish_state(id(compressor).state ? (id(compressor).speed - 1) * 500 + 2000 : 0);

climate:
  - platform: bang_bang
    name: "Fridge"
    id: fridge_thermostat
    sensor: fridge_temp
    icon: "mdi:fridge-bottom"
    web_server:
      sorting_group_id: "temp_targets"

    default_target_temperature_low: 2
    default_target_temperature_high: 3.5

    visual:
      min_temperature: ${math.ceil(fridge_freeze_protection_high)}
      max_temperature: 5
      temperature_step: 0.5

    idle_action:
      then:
        - fan.turn_off: fridge_fan
    cool_action:
      then:
        - fan.turn_on:
            id: fridge_fan
            speed: ${max_fridge_fan_speed}

  - platform: thermostat
    name: "Freezer"
    id: freezer_thermostat
    sensor: freezer_temp
    icon: "mdi:fridge-top"
    web_server:
      sorting_group_id: "temp_targets"

    preset:
      - name: Standard
        default_target_temperature_high: -17.5
      - name: Deep Freeze
        default_target_temperature_high: -20
    default_preset: Standard

    cool_overrun: 1.0
    cool_deadband: 0.0

    min_idle_time: 0s
    min_cooling_off_time: ${compressor_anti_short_cycle_s}s
    min_cooling_run_time: ${compressor_anti_short_cycle_s}s

    visual:
      min_temperature: -20
      max_temperature: -10
      temperature_step: 0.5

    idle_action: []
    cool_action: []

    on_control:
      - script.execute: update_compressor

button:
  - platform: template
    name: "Dump Sensor IDs"
    icon: "mdi:chip"
    entity_category: "diagnostic"
    web_server:
      sorting_group_id: "debug"
    on_press:
      - lambda: id(fridge_bus).dump_config();

  - platform: restart
    name: "Restart"
    id: restart_button
    entity_category: "diagnostic"
    web_server:
      sorting_group_id: "host"

light:
  - platform: esp32_rmt_led_strip
    chipset: WS2812
    rgb_order: GRB
    pin: ${rgb_pin}
    num_leds: 1
    name: "Onboard RGB"
    id: onboard_rgb_light
    icon: "mdi:led-on"
    web_server:
      sorting_group_id: "command"

script:
  - id: apply_sensor_addresses
    then:
      - lambda: |-
          uint64_t addr = strtoull(id(fridge_temp_address_text).state.c_str(), nullptr, 16);
          if (addr > 0) id(fridge_temp).set_address(addr);

          addr = strtoull(id(freezer_temp_address_text).state.c_str(), nullptr, 16);
          if (addr > 0) id(freezer_temp).set_address(addr);

          addr = strtoull(id(compressor_temp_address_text).state.c_str(), nullptr, 16);
          if (addr > 0) id(compressor_temp).set_address(addr);

          addr = strtoull(id(ambient_temp_address_text).state.c_str(), nullptr, 16);
          if (addr > 0) id(ambient_temp).set_address(addr);

  - id: pet_fridge_watchdog
    mode: restart # Restarting kills the previous delay
    then:
      - delay: 3.5min
      - logger.log:
          tag: fridge_watchdog
          level: ERROR
          format: "Too long since last fridge watchdog pet!"
      - if:
          condition:
            switch.is_off: manual_override
          then:
            - button.press: restart_button

  - id: pet_freezer_watchdog
    mode: restart # Restarting kills the previous delay
    then:
      - delay: 3.5min
      - logger.log:
          tag: freezer_watchdog
          level: ERROR
          format: "Too long since last freezer watchdog pet!"
      - if:
          condition:
            switch.is_off: manual_override
          then:
            - button.press: restart_button

  - id: update_compressor
    then:
      - lambda: |-
          static uint32_t last_compressor_speed_change = 0;
          static bool defrosting_after_deep_chill = false;

          // Sliding window state
          static std::deque<float> temp_history;
          static uint32_t last_eval_time = 0;
          const uint32_t kEvalIntervalMs = ${temp_update_interval_s} * 1000;
          const float window_s = id(compressor_window_number).state;
          const size_t history_limit = static_cast<size_t>(window_s / ${temp_update_interval_s}) + 1;
          const uint32_t now = millis();

          if(id(manual_override).state) {
            ESP_LOGW("update_compressor", "Manual override is on; skipping automatic speed update.");
            if (id(defrost_mode).state) {
              ESP_LOGW("update_compressor", "Manual override is on; disabling defrost.");
              id(defrost_mode).publish_state(false);
              defrosting_after_deep_chill = false;
            }
            return;
          }

          const float current_temp = id(freezer_temp).state;
          if (std::isnan(current_temp)) {
            ESP_LOGE("update_compressor", "Freezer temperature is NaN; skipping automatic speed update.");
            return;
          }

          const float target_temp = id(defrost_mode).state ? id(defrost_target_temp).state : id(freezer_thermostat).target_temperature;
          const float error = current_temp - target_temp;

          // Update evaluation timing
          // Subtract 200ms to allow for minor ESPHome interval jitter
          if (temp_history.empty() || now - last_eval_time >= kEvalIntervalMs - 200) {
            temp_history.push_back(current_temp);
            while (temp_history.size() > history_limit) temp_history.pop_front();
            last_eval_time = now;
            
            // Log the full history state for debugging.
            std::string history_str;
            history_str.reserve(128);
            char h_buf[16];
            for (float t : temp_history) {
              if (!history_str.empty()) history_str += ", ";
              int n = snprintf(h_buf, sizeof(h_buf), "%.2f", t);
              if (n > 0 && n < (int)sizeof(h_buf)) history_str.append(h_buf, n);
            }
            ESP_LOGD("update_compressor", "Temp history: [%s]", history_str.c_str());
          }

          // Temperature delta per hour tracking.
          const float current_delta_per_hour = (temp_history.size() >= history_limit) ? (current_temp - temp_history.front()) * (3600.0f / window_s) : NAN;

          // Lead Compensation (Predicted Future Temperature)
          const float lead_time_h = id(thermal_lead_number).state / 60.0f;
          const float predicted_temp = current_temp + (std::isnan(current_delta_per_hour) ? 0.0f : current_delta_per_hour * lead_time_h);
          const float lead_error = predicted_temp - target_temp;
          id(freezer_temp_predicted).publish_state(predicted_temp);

          const float desired_delta_per_hour = (temp_history.size() >= history_limit) ? -lead_error / id(compressor_recovery_time_number).state : NAN;
          id(freezer_temp_delta_per_hour).publish_state(current_delta_per_hour);
          id(freezer_temp_delta_per_hour_desired).publish_state(desired_delta_per_hour);

          // On/Off time tracking.
          id(compressor_on_time).update();
          id(compressor_off_time).update();
          if (!id(compressor).state) {
            float off_time = id(compressor_off_time).state;
            if (defrosting_after_deep_chill) {
              // When defrosting, subtract out the forced defrost time from our max tracking.
              off_time -= ${defrost_duration_s};
            }
            id(max_rest_duration_s) = std::max(id(max_rest_duration_s), off_time);
          }

          // Defrost rest period.
          if (id(defrost_mode).state && defrosting_after_deep_chill) {
            if (id(compressor_off_time).state < ${defrost_duration_s}) {
              return;
            }
            id(defrost_mode).publish_state(false);
          }

          // Freeze protection logic.
          static bool freeze_protection_active = false;
          if (!std::isnan(id(fridge_temp).state)) {
            if (id(fridge_temp).state <= ${fridge_freeze_protection_low}) {
              if (!freeze_protection_active) {
                ESP_LOGW("update_compressor", "Freeze protection ACTIVE (Fridge: %.2f°C <= %.2f°C).", id(fridge_temp).state, ${fridge_freeze_protection_low});
                freeze_protection_active = true;
              }
            } else if (id(fridge_temp).state >= ${fridge_freeze_protection_high}) {
              if (freeze_protection_active) {
                ESP_LOGI("update_compressor", "Freeze protection DEACTIVATED (Fridge: %.2f°C >= %.2f°C).", id(fridge_temp).state, ${fridge_freeze_protection_high});
                freeze_protection_active = false;
              }
            }
          }

          // Determine next compressor speed.
          const int current_speed = id(compressor).state ? id(compressor).speed : 0;
          auto next_compressor_speed = std::max(current_speed, 1);
          bool emergency_override = false;
          if (freeze_protection_active) {
            next_compressor_speed = 0;
            if (id(defrost_mode).state && !defrosting_after_deep_chill) {
              ESP_LOGI("defrost", "Freeze protection active during deep chill; transitioning to rest period early.");
              defrosting_after_deep_chill = true;
            }
          } else if (id(freezer_thermostat).action != climate::CLIMATE_ACTION_COOLING &&
              !id(defrost_mode).state) {
            next_compressor_speed = 0;
          } else if (id(defrost_mode).state && !defrosting_after_deep_chill) {
            if (current_temp <= target_temp) {
              ESP_LOGI("defrost", "Target temperature reached (%.1f°C); shutting compressor for %us.", target_temp, ${defrost_duration_s});
              next_compressor_speed = 0;
              defrosting_after_deep_chill = true;
            } else {
              next_compressor_speed = 5;
              if (current_speed != next_compressor_speed) {
                ESP_LOGI("defrost", "Entering deep chill: forcing compressor to maximum speed.");
              }
            }
          } else if (current_temp >= target_temp + ${compressor_emergency_delta}) {
            // Absolute threshold bypass: jump to max speed
            next_compressor_speed = 5;
            emergency_override = true;
          } else if (current_speed == 0) {
            // Adaptive starting speed based on error and ambient temperature.
            // A starting error of 1.0C or an ambient of 25C results in speed 5.
            // Lower values scale down to a minimum of speed 1.
            const float ambient_speed_factor = (id(ambient_temp).state - 15.0f) / 10.0f; // 0 at 15C, 1 at 25C
            const float error_speed_factor = error / 1.0f; // 0 at 0.0C, 1 at 1.0C
            
            float combined_factor = std::max(ambient_speed_factor, error_speed_factor);
            next_compressor_speed = std::clamp((int)(1.0f + 4.0f * combined_factor), 1, 5);
            
            ESP_LOGI("update_compressor", "Starting compressor at adaptive speed %d (error: %.2f, ambient: %.2f).", 
                     next_compressor_speed, error, id(ambient_temp).state);
          } else if (lead_error <= 0.0f) {
            // Predicted error is zero or negative: we have already done enough cooling.
            // Reached (or predicted to reach) ideal target, float at minimum speed
            next_compressor_speed = 1;
            ESP_LOGD("update_compressor", "Predictive braking: lead_error is %.2f, floating at speed 1.", lead_error);
          } else if (temp_history.size() >= history_limit && id(compressor_on_time).state >= window_s) {
            // Only use dynamic evaluation once history is fully populated with cooling data
            const float tolerance = id(compressor_recovery_tolerance_number).state;
            if (current_delta_per_hour > desired_delta_per_hour + tolerance) {
              next_compressor_speed = std::min(current_speed + 1, 5);
            } else if (current_delta_per_hour < desired_delta_per_hour - tolerance) {
              next_compressor_speed = std::max(current_speed - 1, 1);
            }
          }

          // Turn off compressor as necessary, tracking max error and recovery time.
          static uint32_t recovery_start_ms = 0;
          static float max_error = NAN;
          if (next_compressor_speed == 0) {
            // No more cooling! Turn off the compressor.
            if (id(compressor).state) {
              ESP_LOGI("update_compressor", "Compressor OFF | Temp: %.2f°C (Target: %.2f°C) | Delta: %.2f°C/h | Amb: %.2f°C", 
                       current_temp, target_temp, current_delta_per_hour, id(ambient_temp).state);
              id(compressor).turn_off().perform();
            }
            max_error = NAN;
            return;
          }
          if (std::isnan(max_error) && error > 0.0f) {
            recovery_start_ms = millis();
            max_error = error;
          }
          max_error = std::max(max_error, error);
          if (current_temp <= target_temp && !std::isnan(max_error)) {
            const float elapsed_hours = (millis() - recovery_start_ms) / 3600000.0f;
            if (elapsed_hours > 0.05f && max_error > 0.5f) {
                id(compressor_recovery_time_measured_sensor).publish_state(elapsed_hours);
                ESP_LOGI("recovery_profiler", "Cooling cycle complete. Took %.2f hours. Max error was %.2f°C.", elapsed_hours, max_error);
            }
            max_error = NAN;
          }

          // Check if the compressor needs an anti-short-cycle delay.
          if (!id(compressor).state && id(compressor_off_time).state < ${compressor_anti_short_cycle_s}) {
            ESP_LOGI("update_compressor", "Anti-short-cycle active (%.0fs left).", ${compressor_anti_short_cycle_s} - id(compressor_off_time).state);
          } else if (!id(compressor).state || current_speed != next_compressor_speed) {
            // Check if the compressor speed change is allowed.
            const uint32_t min_interval_ms = id(compressor_speed_change_interval_number).state * 1000;
            
            bool allow_change = false;
            if (emergency_override) {
              allow_change = true; // Emergency bypasses interval checks
            } else if (!id(compressor).state) {
              allow_change = true; // Still governed by the anti-short-cycle delay above
            } else if (now - last_compressor_speed_change >= min_interval_ms) {
              allow_change = true; // Strict minimum time has passed
            }

            if (!allow_change) {
               ESP_LOGD("update_compressor", "Compressor speed change deferred (last change %us ago, min interval %us).", 
                        (now - last_compressor_speed_change) / 1000, min_interval_ms / 1000);
               return;
            }

            // Change the compressor speed.
            last_compressor_speed_change = now;
            if (!std::isnan(current_delta_per_hour)) {
              ESP_LOGI("update_compressor", "Speed change %d to %d | Temp: %.2f°C (Target: %.2f°C, Predicted: %.2f°C, LeadErr: %.2f°C) | Delta: %.2f°C/h (Desired: %.2f°C/h) | Amb: %.2f°C", 
                       current_speed, next_compressor_speed, 
                       current_temp, target_temp, predicted_temp, lead_error,
                       current_delta_per_hour, desired_delta_per_hour,
                       id(ambient_temp).state);
            } else {
              ESP_LOGI("update_compressor", "Speed change %d to %d | Temp: %.2f°C (Target: %.2f°C) | Emergency: %s | Amb: %.2f°C", 
                       current_speed, next_compressor_speed, 
                       current_temp, target_temp, emergency_override ? "yes" : "no",
                       id(ambient_temp).state);
            }
            auto call = id(compressor).turn_on();
            call.set_speed(next_compressor_speed);
            call.perform();
            defrosting_after_deep_chill = false;
          }

  - id: report_stats
    then:
      - udp.write:
          id: influxdb_udp
          data: !lambda |-
            std::string rpt;
            rpt.reserve(1024);
            char buf[32];

            auto add_val = [&](const char* name, float val) {
              if (std::isnan(val)) return;
              rpt += ",";
              rpt += name;
              rpt += "=";
              int n = snprintf(buf, sizeof(buf), "%.4g", val);
              if (n > 0 && n < (int)sizeof(buf)) rpt.append(buf, n);
            };

            auto add_int = [&](const char* name, uint32_t val) {
              rpt += ",";
              rpt += name;
              rpt += "=";
              int n = snprintf(buf, sizeof(buf), "%ui", val);
              if (n > 0 && n < (int)sizeof(buf)) rpt.append(buf, n);
            };

            rpt = "fridgetroll,host=${name} door_closed=";
            rpt += (id(door_closed).state ? 'T' : 'F');
            rpt += ",defrost=";
            rpt += (id(defrost_mode).state ? 'T' : 'F');


            add_int("compressor_on_time", id(compressor_on_time).state);
            add_int("compressor_rpm", id(compressor_rpm).state);
            add_int("uptime", id(sys_uptime).state);
            add_val("ambient_temp", id(ambient_temp).state);
            add_val("compressor_fan_rpm", id(compressor_fan_rpm).state);
            add_val("compressor_temp", id(compressor_temp).state);
            add_val("freezer_target_temp", id(freezer_thermostat).target_temperature);
            add_val("freezer_temp", id(freezer_temp).state);
            add_val("freezer_temp_delta", id(freezer_temp_delta_per_hour).state);
            add_val("freezer_temp_delta_desired", id(freezer_temp_delta_per_hour_desired).state);
            add_val("freezer_temp_predicted", id(freezer_temp_predicted).state);
            add_val("fridge_fan_speed", id(fridge_fan).state ? id(fridge_fan).speed : 0.0f);
            add_val("fridge_target_temp_high", id(fridge_thermostat).target_temperature_high);
            add_val("fridge_target_temp_low", id(fridge_thermostat).target_temperature_low);
            add_val("fridge_temp", id(fridge_temp).state);
            add_val("recovery_time_measured", id(compressor_recovery_time_measured_sensor).state);
            add_val("recovery_time_target", id(compressor_recovery_time_number).state);
            add_val("recovery_tolerance", id(compressor_recovery_tolerance_number).state);
            add_val("recovery_window", id(compressor_window_number).state);
            add_val("thermal_lead", id(thermal_lead_number).state);

            if (rpt.length() > 1400) {
              ESP_LOGE("report_stats", "Telemetry string too long (%d bytes), potential truncation!", rpt.length());
            }

            ESP_LOGD("report_stats", "UDP: %s", rpt.c_str());
            return std::vector<uint8_t>(rpt.begin(), rpt.end());

interval:
  # Update our temperature values in series with a short delay in between.
  # This helps when reading DS18B20 with parasitic power.
  - interval: ${temp_update_interval_s}s
    startup_delay: 1s
    then:
      - component.update: fridge_temp
      - delay: 1s
      - component.update: freezer_temp
      - delay: 1s
      - component.update: ambient_temp
      - delay: 1s
      - component.update: compressor_temp
      - script.execute: update_compressor
      - script.execute: report_stats
