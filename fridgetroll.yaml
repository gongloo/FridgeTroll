substitutions:
  name: "fridgetroll"
  temp_update_interval_s: 10
  # Run the compressor at full blast when kicking on.
  blast_compressor_for_s: 60
  # Max speed for the fridge fan as a percentage.
  max_fridge_fan_speed: 75
  # Exception window for speed changes in the same direction.
  compressor_speed_change_burst_window_s: 15
  # Anti-short-cycle delay for the compressor.
  compressor_anti_short_cycle_s: 180

  # Pins for S3 Mini
  one_wire_bus_pin: GPIO11
  compressor_enable_pin: GPIO12
  compressor_pwm_pin: GPIO10
  fan_speed_pin: GPIO4
  fan_pwm_pin: GPIO13
  door_pin: GPIO2
  rgb_pin: GPIO47
  fridge_fan_pin: GPIO18

esphome:
  name: ${name}
  on_boot:
    - priority: 600
      then:
        - lambda: |-
            if (!id(syslog_ip_text).state.empty()) {
              id(syslog_udp)->set_addresses({id(syslog_ip_text).state.c_str()});
            }
            if (id(syslog_port_number).state > 0) {
              id(syslog_udp)->set_broadcast_port(id(syslog_port_number).state);
            }
            if (!id(influxdb_host_text).state.empty()) {
              id(influxdb_udp)->set_addresses({id(influxdb_host_text).state.c_str()});
            }
            if (id(influxdb_port_number).state > 0) {
              id(influxdb_udp)->set_broadcast_port(id(influxdb_port_number).state);
            }
        - script.execute: apply_sensor_addresses
        - script.execute: pet_fridge_watchdog
        - script.execute: pet_freezer_watchdog
    - priority: -10
      then:
        - component.update: fridge_temp
        - component.update: freezer_temp

esp32:
  board: lolin_s3_mini
  framework:
    type: esp-idf

api:
  reboot_timeout: 0s

improv_serial:

esp32_improv:
  authorizer: none

captive_portal:

wifi:
  ap:
    ssid: "FridgeTroll Fallback"

web_server:
  port: 80
  version: 3
  local: true
  sorting_groups:
    - id: "environment"
      name: "Environment"
      sorting_weight: 10
    - id: "sensor_settings"
      name: "Sensor Configuration"
      sorting_weight: 15
    - id: "settings"
      name: "Settings"
      sorting_weight: 20
    - id: "udp_settings"
      name: "UDP Configuration (Restart Required)"
      sorting_weight: 25
    - id: "compressor_stats"
      name: "Compressor Stats"
      sorting_weight: 30
    - id: "command"
      name: "Command State"
      sorting_weight: 40
    - id: "debug"
      name: "Debug Tools"
      sorting_weight: 100
    - id: "host"
      name: "Host"
      sorting_weight: 110

logger:
  level: DEBUG

select:
  - platform: logger
    name: "Logger select"
    entity_category: "diagnostic"
    web_server:
      sorting_group_id: "debug"

ota:
  - platform: esphome
    password: !secret ota_password

time:
  - platform: sntp
    id: sntp_time
    timezone: "America/New_York"

udp:
  - id: syslog_udp
  - id: influxdb_udp

syslog:
  udp_id: syslog_udp
  strip: true # strip color codes
  level: info

one_wire:
  - platform: gpio
    pin: ${one_wire_bus_pin}
    id: fridge_bus

text_sensor:
  - platform: version
    name: "ESPHome Version"
    web_server:
      sorting_group_id: "host"

sensor:
  - platform: internal_temperature
    name: "ESP Temperature"
    id: sys_esp_temperature
    update_interval: 60s
    icon: "mdi:thermometer-lines"
    web_server:
      sorting_group_id: "host"

  - platform: uptime
    name: Uptime
    id: sys_uptime
    update_interval: ${temp_update_interval_s}s
    web_server:
      sorting_group_id: "host"

  - platform: wifi_signal
    name: RSSI
    icon: "mdi:wifi"
    id: wifi_signal_db
    update_interval: ${temp_update_interval_s}s
    entity_category: "diagnostic"
    web_server:
      sorting_group_id: "host"

  - platform: dallas_temp
    name: "Fridge Temperature"
    icon: "mdi:water-thermometer"
    web_server:
      sorting_group_id: "environment"
    id: fridge_temp
    update_interval: never # Updated by interval
    filters:
      - lambda: |-
          if (x == 85.0) {
            ESP_LOGE("fridge_temp", "Sensor (fridge_temp) reported 85°C (power-on reset value), filtering out.");
            return {};
          }
          return x;
    on_value:
      then:
        - script.execute: pet_fridge_watchdog

  - platform: dallas_temp
    name: "Freezer Temperature"
    icon: "mdi:snowflake-thermometer"
    web_server:
      sorting_group_id: "environment"
    id: freezer_temp
    update_interval: never # Updated by interval
    filters:
      - lambda: |-
          if (x == 85.0) {
            ESP_LOGE("freezer_temp", "Sensor (freezer_temp) reported 85°C (power-on reset value), filtering out.");
            return {};
          }
          return x;
    on_value:
      then:
        - script.execute: pet_freezer_watchdog

  - platform: pulse_counter
    name: "Fan Speed"
    id: "compressor_fan_rpm"
    icon: "mdi:fan"
    web_server:
      sorting_group_id: "compressor_stats"
    unit_of_measurement: "RPM"
    accuracy_decimals: 0
    filters:
      - lambda: return x / 2.0;
    update_interval: ${temp_update_interval_s}s
    pin:
      number: ${fan_speed_pin}
      inverted: true
      mode:
        input: true
        pullup: true

  - platform: duty_time
    id: compressor_on_time
    name: "Compressor On Time"
    icon: "mdi:pump"
    web_server:
      sorting_group_id: "compressor_stats"
    lambda: "return id(compressor).state;"
    accuracy_decimals: 0
    update_interval: ${temp_update_interval_s}s
    last_time:
      name: "Last Compressor On Time"
      icon: "mdi:pump"
      web_server:
        sorting_group_id: "compressor_stats"
      accuracy_decimals: 0

  - platform: duty_time
    id: compressor_off_time
    name: "Compressor Off Time"
    icon: "mdi:pump-off"
    web_server:
      sorting_group_id: "compressor_stats"
    lambda: "return !id(compressor).state;"
    accuracy_decimals: 0
    update_interval: ${temp_update_interval_s}s
    last_time:
      name: "Last Compressor Off Time"
      icon: "mdi:pump-off"
      web_server:
        sorting_group_id: "compressor_stats"
      accuracy_decimals: 0

  - platform: duty_time
    id: door_open_time
    internal: true
    lambda: "return !id(door_closed).state;"
    update_interval: ${temp_update_interval_s}s

  - platform: template
    id: compressor_rpm
    internal: True
    update_interval: never # Updated from compressor fan
    on_value:
      - lambda: |-
          if (x < 2000) return;
          float ratio = (x - 2000.0) / 2000.0;
          if (ratio < 0) ratio = 0;
          if (ratio > 1) ratio = 1;
          const float duty = (0.87 - (ratio * 0.6));
          ESP_LOGD("compressor_rpm", "Setting compressor PWM output to %f.", duty);
          id(compressor_pwm).set_level(duty);

  - platform: dallas_temp
    name: "Compressor Temperature"
    id: compressor_temp
    icon: "mdi:radiator"
    web_server:
      sorting_group_id: "environment"
    update_interval: never # Updated by interval
    filters:
      - lambda: |-
          if (x == 85.0) {
            ESP_LOGE("compressor_temp", "Sensor (compressor_temp) reported 85°C (power-on reset value), filtering out.");
            return {};
          }
          return x;
    on_value:
      then:
        - lambda: |-
            constexpr float kHighCompressorTemp = 43;
            constexpr float kMinFanSpeed = 30.0; // Minimum fan speed %
            constexpr float kMaxFanSpeed = 100.0; // Maximum fan speed %

            const float comp_temp = x;
            const float amb_temp = id(ambient_temp).state;

            if (std::isnan(comp_temp) || std::isnan(amb_temp)) {
              auto call = id(compressor_cooling_fan).turn_on();
              call.set_speed(100);
              call.perform();
              return;
            }

            const float delta = comp_temp - amb_temp;

            // Fan curve configuration (Delta T from ambient)
            const float min_delta = 5.0; // Fan starts here
            const float max_delta = std::min(15.0f, kHighCompressorTemp - amb_temp); // Fan at max speed here

            if (delta < min_delta) {
              if (id(compressor_cooling_fan).state) {
                id(compressor_cooling_fan).turn_off().perform();
              }
              return;
            }

            // Linear interpolation.
            const float speed_factor = ((delta - min_delta) / (max_delta - min_delta));
            const float speed_percent = kMinFanSpeed + (kMaxFanSpeed - kMinFanSpeed) * speed_factor;
            auto call = id(compressor_cooling_fan).turn_on();
            call.set_speed(std::min(100.0f, speed_percent));
            call.perform();

  - platform: dallas_temp
    name: "Ambient Temperature"
    id: ambient_temp
    icon: "mdi:home-thermometer"
    web_server:
      sorting_group_id: "environment"
    update_interval: never # Updated by interval
    filters:
      - lambda: |-
          if (x == 85.0) {
            ESP_LOGE("ambient_temp", "Sensor (ambient_temp) reported 85°C (power-on reset value), filtering out.");
            return {};
          }
          return x;

text:
  - platform: template
    mode: text
    name: "Fridge Temperature Address"
    id: fridge_temp_address_text
    icon: "mdi:identifier"
    optimistic: true
    min_length: 18
    max_length: 18
    restore_value: true
    entity_category: "config"
    web_server:
      sorting_group_id: "sensor_settings"
    on_value:
      - script.execute: apply_sensor_addresses

  - platform: template
    mode: text
    name: "Freezer Temperature Address"
    id: freezer_temp_address_text
    icon: "mdi:identifier"
    optimistic: true
    min_length: 18
    max_length: 18
    restore_value: true
    entity_category: "config"
    web_server:
      sorting_group_id: "sensor_settings"
    on_value:
      - script.execute: apply_sensor_addresses

  - platform: template
    mode: text
    name: "Compressor Temperature Address"
    id: compressor_temp_address_text
    icon: "mdi:identifier"
    optimistic: true
    min_length: 18
    max_length: 18
    restore_value: true
    entity_category: "config"
    web_server:
      sorting_group_id: "sensor_settings"
    on_value:
      - script.execute: apply_sensor_addresses

  - platform: template
    mode: text
    name: "Ambient Temperature Address"
    id: ambient_temp_address_text
    icon: "mdi:identifier"
    optimistic: true
    min_length: 18
    max_length: 18
    restore_value: true
    entity_category: "config"
    web_server:
      sorting_group_id: "sensor_settings"
    on_value:
      - script.execute: apply_sensor_addresses

  - platform: template
    mode: text
    name: "Syslog Server IP"
    id: syslog_ip_text
    icon: "mdi:ip-network"
    optimistic: true
    min_length: 7
    max_length: 15
    restore_value: true
    entity_category: "config"
    web_server:
      sorting_group_id: "udp_settings"

  - platform: template
    mode: text
    name: "InfluxDB Host IP"
    id: influxdb_host_text
    icon: "mdi:ip-network"
    optimistic: true
    min_length: 7
    max_length: 15
    restore_value: true
    entity_category: "config"
    web_server:
      sorting_group_id: "udp_settings"

number:
  - platform: template
    name: "Syslog Port"
    id: syslog_port_number
    icon: "mdi:network-port"
    optimistic: true
    min_value: 1
    max_value: 65535
    initial_value: 514
    step: 1
    restore_value: true
    entity_category: "config"
    web_server:
      sorting_group_id: "udp_settings"

  - platform: template
    name: "InfluxDB Port"
    id: influxdb_port_number
    icon: "mdi:network-port"
    optimistic: true
    min_value: 1
    max_value: 65535
    initial_value: 8089
    step: 1
    restore_value: true
    entity_category: "config"
    web_server:
      sorting_group_id: "udp_settings"

  - platform: template
    name: "Compressor Speed Min Interval"
    id: compressor_speed_change_interval_number
    icon: "mdi:clock-fast"
    optimistic: true
    min_value: 0
    max_value: 600
    initial_value: 90
    step: 1
    unit_of_measurement: "s"
    restore_value: true
    entity_category: "config"
    web_server:
      sorting_group_id: "settings"

switch:
  - platform: template
    name: "Manual Override"
    id: manual_override
    icon: "mdi:cog-transfer"
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    entity_category: "diagnostic"
    web_server:
      sorting_group_id: "debug"

binary_sensor:
  - platform: gpio
    pin:
      number: ${door_pin}
      mode: INPUT_PULLUP
    name: "Door Closed"
    id: "door_closed"
    icon: "mdi:fridge-industrial"
    web_server:
      sorting_group_id: "environment"
    on_release:
      - light.turn_on:
          id: onboard_rgb_light
          red: 1.0
          green: 1.0
          blue: 0.0
          brightness: 1.0
      - sensor.duty_time.reset: door_open_time
      # Sync to 1 immediately for our external triggers/monitoring
      - delay: 1s
      - component.update: door_open_time
      - script.execute: report_stats
    on_press:
      - light.turn_off:
          id: onboard_rgb_light
      - component.update: door_open_time # Sync final duration.
      - script.execute: report_stats
      # Sync zero immediately for our eternal triggers/monitoring.
      - sensor.duty_time.reset: door_open_time
      - script.execute: report_stats

output:
  - platform: ledc
    pin: ${compressor_pwm_pin}
    frequency: 200Hz
    channel: 0
    id: compressor_pwm

  - platform: gpio
    pin: ${compressor_enable_pin}
    id: compressor_enable_output

  - platform: ledc
    pin: ${fan_pwm_pin}
    frequency: 25kHz
    channel: 2
    id: compressor_cooling_fan_pwm

  - platform: ledc
    pin: ${fridge_fan_pin}
    frequency: 25kHz
    channel: 4
    id: fridge_fan_pwm

fan:
  - platform: speed
    output: compressor_cooling_fan_pwm
    name: "Compressor Cooling Fan"
    id: compressor_cooling_fan
    icon: "mdi:fan"
    web_server:
      sorting_group_id: "command"

  - platform: speed
    output: fridge_fan_pwm
    name: "Fridge Fan"
    id: fridge_fan
    icon: "mdi:fan"
    web_server:
      sorting_group_id: "command"

  - platform: template
    name: "Compressor"
    id: compressor
    icon: "mdi:pump"
    web_server:
      sorting_group_id: "command"
    speed_count: 5
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - output.turn_on: compressor_enable_output
      - sensor.duty_time.reset: compressor_on_time
      - component.update: compressor_off_time
      - sensor.duty_time.reset: compressor_off_time
      - lambda: |-
          id(compressor_rpm).publish_state((id(compressor).speed - 1) * 500 + 2000);
    on_turn_off:
      - output.turn_off: compressor_enable_output
      - component.update: compressor_on_time
      - sensor.duty_time.reset: compressor_on_time
      - sensor.duty_time.reset: compressor_off_time
    on_speed_set:
      - lambda: |-
          id(compressor_rpm).publish_state((id(compressor).speed - 1) * 500 + 2000);

climate:
  - platform: bang_bang
    name: "Fridge Thermostat"
    id: fridge_thermostat
    sensor: fridge_temp
    icon: "mdi:fridge-bottom"
    web_server:
      sorting_group_id: "settings"

    default_target_temperature_low: 2
    default_target_temperature_high: 3.5

    visual:
      min_temperature: 1
      max_temperature: 5
      temperature_step: 0.5

    idle_action:
      then:
        - fan.turn_off: fridge_fan
    cool_action:
      then:
        - fan.turn_on:
            id: fridge_fan
            speed: ${max_fridge_fan_speed}

  - platform: bang_bang
    name: "Freezer Thermostat"
    id: freezer_thermostat
    sensor: freezer_temp
    icon: "mdi:fridge-top"
    web_server:
      sorting_group_id: "settings"

    # Note the freezer should typically be much colder than this.
    # Setting these too low might cause the fridge to get too cold!
    default_target_temperature_low: -15
    default_target_temperature_high: -9.5

    visual:
      min_temperature: -18
      max_temperature: -7
      temperature_step: 0.5

    idle_action:
      then:
    cool_action:
      then:
    on_control:
      - script.execute: update_compressor

button:
  - platform: template
    name: "Dump Sensor IDs"
    icon: "mdi:chip"
    entity_category: "diagnostic"
    web_server:
      sorting_group_id: "debug"
    on_press:
      - lambda: id(fridge_bus).dump_config();

  - platform: restart
    name: "Restart"
    id: restart_button
    entity_category: "diagnostic"
    web_server:
      sorting_group_id: "host"

light:
  - platform: esp32_rmt_led_strip
    chipset: WS2812
    rgb_order: GRB
    pin: ${rgb_pin}
    num_leds: 1
    name: "Onboard RGB"
    id: onboard_rgb_light
    icon: "mdi:led-on"
    web_server:
      sorting_group_id: "command"

script:
  - id: apply_sensor_addresses
    then:
      - lambda: |-
          uint64_t addr = strtoull(id(fridge_temp_address_text).state.c_str(), nullptr, 16);
          if (addr > 0) id(fridge_temp).set_address(addr);

          addr = strtoull(id(freezer_temp_address_text).state.c_str(), nullptr, 16);
          if (addr > 0) id(freezer_temp).set_address(addr);

          addr = strtoull(id(compressor_temp_address_text).state.c_str(), nullptr, 16);
          if (addr > 0) id(compressor_temp).set_address(addr);

          addr = strtoull(id(ambient_temp_address_text).state.c_str(), nullptr, 16);
          if (addr > 0) id(ambient_temp).set_address(addr);

  - id: pet_fridge_watchdog
    mode: restart # Restarting kills the previous delay
    then:
      - delay: 3.5min
      - logger.log:
          tag: fridge_watchdog
          level: ERROR
          format: "Too long since last fridge watchdog pet!"
      - if:
          condition:
            switch.is_off: manual_override
          then:
            - button.press: restart_button

  - id: pet_freezer_watchdog
    mode: restart # Restarting kills the previous delay
    then:
      - delay: 3.5min
      - logger.log:
          tag: freezer_watchdog
          level: ERROR
          format: "Too long since last freezer watchdog pet!"
      - if:
          condition:
            switch.is_off: manual_override
          then:
            - button.press: restart_button

  - id: update_compressor
    then:
      - lambda: |-
          static uint32_t last_compressor_speed_change = 0;
          enum class Direction { NONE, INCREASE, DECREASE };
          static Direction last_direction = Direction::NONE;

          if(id(manual_override).state) {
            ESP_LOGW("update_compressor", "Manual override is on, skipping automatic speed update.");
            return;
          }

          const bool cool_freezer = id(freezer_thermostat).action == CLIMATE_ACTION_COOLING;

          if (!cool_freezer) {
            if (id(compressor).state) {
              id(compressor).turn_off().perform();
            }
            return;
          }

          auto next_compressor_speed = std::max(id(compressor).speed, 1);

          const float freezer_temp_delta_low =
              id(freezer_temp).state - id(freezer_thermostat).target_temperature_low;

          id(compressor_on_time).update();
          if (id(compressor_on_time).state < ${blast_compressor_for_s}) {
            // Always start compressor at max.
            next_compressor_speed = 5;
          } else if (freezer_temp_delta_low > 0.8) {
            next_compressor_speed = 5;
          } else if (freezer_temp_delta_low > 0.6) {
            next_compressor_speed = 4;
          } else if (freezer_temp_delta_low > 0.4) {
            next_compressor_speed = 3;
          } else if (freezer_temp_delta_low > 0.2) {
            next_compressor_speed = 2;
          } else {
            next_compressor_speed = 1;
          }

          // Check if the compressor needs an anti-short-cycle delay.
          if (!id(compressor).state && id(compressor_off_time).state < ${compressor_anti_short_cycle_s}) {
            ESP_LOGI("update_compressor", "Anti-short-cycle active (%.0fs left).", ${compressor_anti_short_cycle_s} - id(compressor_off_time).state);
          } else if (!id(compressor).state || id(compressor).speed != next_compressor_speed) {
            // Check if the compressor speed change is allowed.
            const uint32_t now = millis();
            const uint32_t min_interval_ms = id(compressor_speed_change_interval_number).state * 1000;
            const uint32_t burst_window_ms = ${compressor_speed_change_burst_window_s} * 1000;

            const int current_speed = id(compressor).state ? id(compressor).speed : 0;
            const Direction direction = (next_compressor_speed > current_speed) ? Direction::INCREASE : Direction::DECREASE;

            bool allow_change = false;
            if (last_direction == Direction::NONE) {
              allow_change = true;
            } else {
              const uint32_t elapsed = now - last_compressor_speed_change;
              if (elapsed >= min_interval_ms) {
                allow_change = true;
              } else if (direction == last_direction && elapsed < burst_window_ms) {
                ESP_LOGI("update_compressor", "Compressor speed burst allowed (same direction within %us).", ${compressor_speed_change_burst_window_s});
                allow_change = true;
              }
            }

            if (!allow_change) {
               ESP_LOGI("update_compressor", "Compressor speed change deferred (last change %us ago, min interval %us).", 
                        (now - last_compressor_speed_change) / 1000, min_interval_ms / 1000);
               return;
            }

            // Change the compressor speed.
            last_compressor_speed_change = now;
            last_direction = direction;
            ESP_LOGI("update_compressor", "Changing compressor speed from %d to %d.", current_speed, next_compressor_speed);
            auto call = id(compressor).turn_on();
            call.set_speed(next_compressor_speed);
            call.perform();
          }

  - id: report_stats
    then:
      #- influxdb.publish_batch:
      #    - full_dump
      - udp.write:
          id: influxdb_udp
          data: !lambda |-
            char rpt[512];
            int len = snprintf(rpt, sizeof(rpt), "fridgetroll,host=${name} door_closed=%c",
                               id(door_closed).state ? 'T' : 'F');

            auto add_val = [&](const char* name, float val) {
              if (!std::isnan(val)) len += snprintf(rpt + len, sizeof(rpt) - len, ",%s=%.4g", name, val);
            };
            auto add_int = [&](const char* name, float val) {
              if (!std::isnan(val)) len += snprintf(rpt + len, sizeof(rpt) - len, ",%s=%ui", name, (uint32_t)val);
            };

            add_int("uptime", id(sys_uptime).state);
            add_val("fridge_temperature", id(fridge_temp).state);
            add_val("freezer_temperature", id(freezer_temp).state);
            add_int("compressor_on_time", id(compressor_on_time).state);
            add_int("compressor_rpm", id(compressor_rpm).state);
            add_val("fridge_target_temp_low", id(fridge_thermostat).target_temperature_low);
            add_val("fridge_target_temp_high", id(fridge_thermostat).target_temperature_high);
            add_val("freezer_target_temp_low", id(freezer_thermostat).target_temperature_low);
            add_val("freezer_target_temp_high", id(freezer_thermostat).target_temperature_high);
            add_val("compressor_temperature", id(compressor_temp).state);
            add_val("ambient_temperature", id(ambient_temp).state);
            add_val("fan_speed", id(compressor_fan_rpm).state);

            if (id(fridge_fan).state || !std::isnan(id(fridge_fan).speed)) {
              add_val("fridge_fan_speed", id(fridge_fan).state ? id(fridge_fan).speed : 0.0f);
            }

            ESP_LOGD("report_stats", "UDP: %s", rpt);
            return std::vector<uint8_t>(rpt, rpt + len);

interval:
  # Update our temperature values in series with a short delay in between.
  # This helps when reading DS18B20 with parasitic power.
  - interval: ${temp_update_interval_s}s
    startup_delay: 1s
    then:
      - component.update: fridge_temp
      - delay: 1s
      - component.update: freezer_temp
      - delay: 1s
      - component.update: ambient_temp
      - delay: 1s
      - component.update: compressor_temp
      - script.execute: update_compressor
      - script.execute: report_stats
